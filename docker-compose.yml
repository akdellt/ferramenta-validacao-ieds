services:
  # --- SERVIÇO DO BACKEND ---
  backend:
    build: ./backend
    container_name: fast_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  # --- SERVIÇO DO FRONTEND ---
  frontend:
    build: ./frontend
    container_name: react_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

  # --- SERVIÇO DO BANCO DE DADOS (POSTGRES) ---
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    environment:
      - TZ=America/Sao_Paulo
    ports:
      - "5432:5432"

volumes:
  postgres_data:
